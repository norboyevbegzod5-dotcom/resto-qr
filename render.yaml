services:
  - type: web
    name: resto-qr
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        value: https://resto-qr.onrender.com
      - key: TELEGRAM_BOT_USERNAME
        value: resto_restaurantbot
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DOLCETTA_BOT_TOKEN
        sync: false
      - key: UZBEKONA_BOT_TOKEN
        sync: false
